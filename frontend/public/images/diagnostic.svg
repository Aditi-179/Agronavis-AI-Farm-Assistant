<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Clipboard background -->
  <rect x="20" y="15" width="60" height="75" rx="4" fill="#f8f9fa" stroke="#2c3e50" stroke-width="2"/>
  
  <!-- Clipboard clip -->
  <rect x="40" y="10" width="20" height="8" rx="3" fill="#34495e"/>
  
  <!-- Header line -->
  <line x1="25" y1="28" x2="75" y2="28" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Diagnosis lines -->
  <line x1="30" y1="40" x2="70" y2="40" stroke="#2c3e50" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="50" x2="65" y2="50" stroke="#2c3e50" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="60" x2="70" y2="60" stroke="#2c3e50" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="70" x2="60" y2="70" stroke="#2c3e50" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Checkmark for diagnosis -->
  <circle cx="65" cy="75" r="8" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/>
  <polyline points="61,75 64,78 69,73" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
